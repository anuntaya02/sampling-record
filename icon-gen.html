<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>body{margin:0;background:#000}</style>
</head>
<body>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.22;
  // Background
  ctx.fillStyle = '#2563eb';
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  // Q letter
  const cx = size * 0.5;
  const cy = size * 0.48;
  const or = size * 0.28;
  const ir = size * 0.16;
  const lw = size * 0.07;

  // Outer circle
  ctx.beginPath();
  ctx.arc(cx, cy, or, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();

  // Inner circle (cutout)
  ctx.beginPath();
  ctx.arc(cx, cy, ir, 0, Math.PI * 2);
  ctx.fillStyle = '#2563eb';
  ctx.fill();

  // Q tail
  ctx.beginPath();
  ctx.moveTo(cx + ir * 0.6, cy + ir * 0.6);
  ctx.lineTo(cx + or * 0.85, cy + or * 0.85);
  ctx.lineWidth = lw;
  ctx.strokeStyle = 'white';
  ctx.lineCap = 'round';
  ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const c512 = document.getElementById('c512');
const c192 = document.getElementById('c192');
drawIcon(c512, 512);
drawIcon(c192, 192);

document.body.innerHTML += '<a id="dl512" download="icon-512.png">512</a><a id="dl192" download="icon-192.png">192</a>';
document.getElementById('dl512').href = c512.toDataURL('image/png');
document.getElementById('dl192').href = c192.toDataURL('image/png');
</script>
</body>
</html>
